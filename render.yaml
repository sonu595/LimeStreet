services:
  - type: web
    runtime: docker
    name: limestreet-api
    rootDir: LimeStreet
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    domains:
      - api.limestreet.shop
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: limestreet-db
          property: connectionString
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: limestreet-db
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: limestreet-db
          property: port
      - key: SPRING_DATASOURCE_NAME
        fromDatabase:
          name: limestreet-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: limestreet-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: limestreet-db
          property: password
      - key: SPRING_DATA_REDIS_URL
        fromService:
          type: keyvalue
          name: limestreet-redis
          property: connectionString
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://limestreet.shop,https://www.limestreet.shop,https://*.onrender.com,http://localhost:*,http://127.0.0.1:*
      - key: APP_UPLOAD_DIR
        value: /tmp/limestreet-uploads
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
        value: INFO
      - key: LOGGING_LEVEL_COM_CLOTHING_STARTUP
        value: INFO
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    runtime: static
    name: limestreet-web
    rootDir: Frontend
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    domains:
      - limestreet.shop
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.limestreet.shop/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: limestreet-redis
    plan: free
    region: singapore
    ipAllowList: []

databases:
  - name: limestreet-db
    plan: free
    region: singapore
    postgresMajorVersion: "17"
    databaseName: limestreet
    user: limestreet
